<div class="cookie-bento-box" *ngIf="showBanner">
  <div class="header">
    <span class="tag">PRIVACY 01</span>
    <span class="tag">ANALYTICS</span>
  </div>
  <div class="content">
    <p>Para entender qué secciones del portfolio te interesan más, utilizo <strong>Google Analytics</strong>. ¿Me das permiso para medir tu visita de forma anónima?</p>
  </div>
  <div class="actions">
    <button (click)="decline()" class="btn-secondary">RECHAZAR</button>
    <button (click)="accept()" class="btn-primary">ACEPTAR</button>
  </div>
</div>
